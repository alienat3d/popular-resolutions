<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Самые популярные экраны</title>
	<link rel="icon" type="image/png" href="./favicon/favicon-96x96.png" sizes="96x96" />
	<link rel="icon" id="favicon" href="./favicon/favicon-dark.png" type="image/png">
	<link rel="shortcut icon" href="/favicon/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png" />
	<meta name="apple-mobile-web-app-title" content="pop screens" />
	<link rel="manifest" href="./favicon/site.webmanifest" />
	<link href="./styles.css" rel="stylesheet">
</head>

<body>
	<header>
		<div class="theme-toggle" tooltip="Сменить цветовую схему">
			<input class="theme-toggle-input" type="checkbox" name="theme-toggle" id="theme-toggle">
			<label class="theme-toggle-label" for="theme-toggle">
				<div class="theme-toggle-inner">
					<div class="theme-toggle-ball"></div>
				</div>
			</label>
		</div>
	</header>
	<main>
		<div class="container">
			<h1>Самые популярные разрешения экрана в <button class="where-at">Российской Федерации</button> на <span
					class="date">15.05.2026</span>:</h1>
			<table class="resolutions-list">
				<thead>
					<tr>
						<th>№</th>
						<th class="width-header"><button>Ширина</button></th>
						<th class="height-header"><button>Высота</button></th>
						<th class="portion-header"><button>Пропорция</button></th>
					</tr>
				</thead>
				<tbody></tbody>
			</table>
		</div>
	</main>
	<footer></footer>
	<script src="./scripts.js"></script>
</body>

</html>
